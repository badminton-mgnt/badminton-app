<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Badminton Attendance & Expense App</title>
    <script>
      ;(function () {
        const redirect = sessionStorage.getItem('gh-pages-spa-redirect')
        if (!redirect) return

        sessionStorage.removeItem('gh-pages-spa-redirect')
        const base = '%BASE_URL%'.replace(/\/+$/, '')
        const normalizedRedirect = redirect.startsWith('/') ? redirect : `/${redirect}`
        const restoredPath = `${base}${normalizedRedirect}`.replace(/\/{2,}/g, '/')
        window.history.replaceState(null, '', restoredPath)
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
